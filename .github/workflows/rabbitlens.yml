name: RabbitLens CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rabbitlens-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  RABBITMQ_SERVER_REF: "772002718e1bd154dfaaeb61156c4693dc220351"

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout RabbitLens
        uses: actions/checkout@v4

      - name: Checkout RabbitMQ legacy management source
        uses: actions/checkout@v4
        with:
          repository: rabbitmq/rabbitmq-server
          ref: ${{ env.RABBITMQ_SERVER_REF }}
          path: rabbitmq-server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Parity manifest verification
        run: npm run test:parity

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run check:bundle

  browser:
    name: Browser regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout RabbitLens
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Performance tests
        run: npm run test:performance

      - name: Scan artifacts for leaked secrets
        run: npm run test:artifact-secrets

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
