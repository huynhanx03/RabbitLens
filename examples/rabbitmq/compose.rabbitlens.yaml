services:
  rabbitmq:
    ports: !override
      - "${RABBITMQ_BIND_ADDRESS:-127.0.0.1}:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_BIND_ADDRESS:-127.0.0.1}:${RABBITMQ_STREAM_PORT:-5552}:5552"
      - "${RABBITMQ_BIND_ADDRESS:-127.0.0.1}:${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"

  rabbitlens:
    image: ${RABBITLENS_IMAGE:-rabbitlens:local}
    build:
      context: ../../website
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${RABBITLENS_BIND_ADDRESS:-127.0.0.1}:${RABBITLENS_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
